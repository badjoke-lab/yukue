version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(actions)"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    versioning-strategy: "increase"
    open-pull-requests-limit: 5
    groups:
      node-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"
