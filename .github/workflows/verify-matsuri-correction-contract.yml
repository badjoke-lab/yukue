name: Verify Matsuri correction contract

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/verify-matsuri-correction-contract.yml"
      - "apps/matsuri/scripts/load-matsuri-dataset.mjs"
      - "apps/matsuri/src/data/matsuri-projection.ts"
      - "apps/matsuri/src/data/matsuri-canonical-dataset.mjs"
      - "apps/matsuri/src/data/matsuri-canonical-dataset.d.mts"
      - "apps/matsuri/src/data/matsuri-record-overrides.mjs"
      - "apps/matsuri/src/data/matsuri-record-overrides.d.mts"
      - "data/public/matsuri/f1/**"
      - "data/public/matsuri/f2/**"
      - "scripts/check-matsuri-correction-contract.mjs"
      - "package.json"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/verify-matsuri-correction-contract.yml"
      - "apps/matsuri/scripts/load-matsuri-dataset.mjs"
      - "apps/matsuri/src/data/matsuri-projection.ts"
      - "apps/matsuri/src/data/matsuri-canonical-dataset.mjs"
      - "apps/matsuri/src/data/matsuri-canonical-dataset.d.mts"
      - "apps/matsuri/src/data/matsuri-record-overrides.mjs"
      - "apps/matsuri/src/data/matsuri-record-overrides.d.mts"
      - "data/public/matsuri/f1/**"
      - "data/public/matsuri/f2/**"
      - "scripts/check-matsuri-correction-contract.mjs"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-correction-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.10.0

      - name: Verify correction contract
        run: pnpm check:matsuri:correction-contract

      - name: Write verification summary
        if: always()
        run: |
          echo "## Matsuri shared correction contract" >> "$GITHUB_STEP_SUMMARY"
          echo "- The shared dataset assembler must use the one shared correction engine" >> "$GITHUB_STEP_SUMMARY"
          echo "- Missing IDs, duplicate accumulated IDs, and non-increasing versions fail the check with or without corrections" >> "$GITHUB_STEP_SUMMARY"
          echo "- Every declared record family must expose the final ordered full-record correction" >> "$GITHUB_STEP_SUMMARY"
