name: Verify Matsuri F2-24 indexability preflight

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/verify-matsuri-indexability-preflight.yml"
      - "scripts/check-matsuri-indexability-preflight.mjs"
      - "scripts/check-matsuri-search-engine-submission-record.mjs"
      - "config/matsuri-search-engine-submission.json"
      - "package.json"
      - "docs/f2-24-sitemap-submission-indexability.md"
      - "docs/templates/matsuri-f2-24-submission-evidence.md"
      - "docs/audits/matsuri-f2-24-*.md"
      - "docs/project-status.md"
      - "docs/development-schedule.md"
      - "docs/roadmap.md"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/verify-matsuri-indexability-preflight.yml"
      - "scripts/check-matsuri-indexability-preflight.mjs"
      - "scripts/check-matsuri-search-engine-submission-record.mjs"
      - "config/matsuri-search-engine-submission.json"
      - "package.json"
      - "docs/f2-24-sitemap-submission-indexability.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-matsuri-indexability-preflight-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  verify-indexability-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MATSURI_CHECK_ORIGIN: https://matsuri-yukue.badjoke-lab.com

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.10.0

      - name: Validate search-engine submission record
        run: pnpm check:matsuri:search-engine-submission-record

      - name: Verify public technical indexability
        run: pnpm check:matsuri:indexability-preflight

      - name: Upload F2-24 preflight evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: matsuri-indexability-preflight-${{ github.sha }}
          path: artifacts/matsuri-indexability-preflight
          if-no-files-found: error
          retention-days: 30

      - name: Write verification summary
        if: always()
        shell: bash
        run: |
          echo "## Matsuri F2-24 indexability preflight" >> "$GITHUB_STEP_SUMMARY"
          echo "- Origin: $MATSURI_CHECK_ORIGIN" >> "$GITHUB_STEP_SUMMARY"
          echo "- Sitemap: $MATSURI_CHECK_ORIGIN/sitemap.xml" >> "$GITHUB_STEP_SUMMARY"
          echo "- Coverage: robots, sitemap inventory, final URLs, self-canonicals, robots directives, title, H1" >> "$GITHUB_STEP_SUMMARY"
          echo "- Boundary: this workflow does not use a search-engine owner account, submit a sitemap, or prove indexation" >> "$GITHUB_STEP_SUMMARY"
          echo "- Evidence artifact: matsuri-indexability-preflight-$GITHUB_SHA" >> "$GITHUB_STEP_SUMMARY"
