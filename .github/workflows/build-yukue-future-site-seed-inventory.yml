name: Build Yukue future-site seed inventory

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/build-yukue-future-site-seed-inventory.yml"
      - "apps/matsuri/scripts/load-matsuri-dataset.mjs"
      - "config/yukue-future-site-seed-artifact-contract.json"
      - "data/public/matsuri/**"
      - "docs/future-site-seed-artifact-contract.md"
      - "docs/future-site-seed-inventory.md"
      - "docs/future-site-seed-provenance-bundle.md"
      - "package.json"
      - "scripts/build-yukue-future-site-seed-inventory.mjs"
      - "scripts/build-yukue-future-site-seed-provenance-bundle.mjs"
      - "scripts/check-yukue-future-site-seed-artifact-contract.mjs"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-yukue-future-site-seed-inventory.yml"
      - "apps/matsuri/scripts/load-matsuri-dataset.mjs"
      - "config/yukue-future-site-seed-artifact-contract.json"
      - "data/public/matsuri/**"
      - "docs/future-site-seed-artifact-contract.md"
      - "docs/future-site-seed-inventory.md"
      - "docs/future-site-seed-provenance-bundle.md"
      - "package.json"
      - "scripts/build-yukue-future-site-seed-inventory.mjs"
      - "scripts/build-yukue-future-site-seed-provenance-bundle.mjs"
      - "scripts/check-yukue-future-site-seed-artifact-contract.mjs"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: yukue-future-site-seeds-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24

      - name: Install pnpm
        run: npm install --global pnpm@11.10.0

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build and validate seed inventory, provenance, and contract
        run: pnpm audit:yukue:future-site-seeds

      - name: Upload seed inventory
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: yukue-future-site-seeds-${{ github.sha }}
          path: .artifacts/yukue-future-site-seeds/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 30

      - name: Write summary
        shell: bash
        run: |
          echo "## Yukue future-site seed inventory" >> "$GITHUB_STEP_SUMMARY"
          if [ -f ".artifacts/yukue-future-site-seeds/summary.md" ]; then
            cat ".artifacts/yukue-future-site-seeds/summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f ".artifacts/yukue-future-site-seeds/provenance.json" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Self-contained provenance bundle: generated" >> "$GITHUB_STEP_SUMMARY"
            echo "Artifact contract v1: passed" >> "$GITHUB_STEP_SUMMARY"
          fi
