name: Generate pnpm lockfile

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/generate-pnpm-lockfile.yml"
      - ".github/dependabot.yml"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "apps/**/package.json"
      - "packages/**/package.json"
      - "scripts/check-node-dependency-specifiers.mjs"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.10.0

      - name: Generate lockfile only
        run: pnpm install --lockfile-only

      - name: Upload generated lockfile
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: generated-pnpm-lockfile-${{ github.sha }}
          path: pnpm-lock.yaml
          if-no-files-found: error
          retention-days: 7

      - name: Audit direct dependency specifiers
        run: node scripts/check-node-dependency-specifiers.mjs --require-lockfile
