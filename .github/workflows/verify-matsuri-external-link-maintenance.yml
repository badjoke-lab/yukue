name: Verify Matsuri external-link maintenance

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/verify-matsuri-external-link-maintenance.yml"
      - "apps/matsuri/scripts/load-matsuri-dataset.mjs"
      - "apps/matsuri/src/data/matsuri-canonical-dataset.mjs"
      - "apps/matsuri/src/data/matsuri-record-overrides.mjs"
      - "data/public/matsuri/**"
      - "scripts/check-matsuri-external-link-maintenance.mjs"
      - "package.json"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/verify-matsuri-external-link-maintenance.yml"
      - "apps/matsuri/scripts/load-matsuri-dataset.mjs"
      - "apps/matsuri/src/data/matsuri-canonical-dataset.mjs"
      - "apps/matsuri/src/data/matsuri-record-overrides.mjs"
      - "data/public/matsuri/**"
      - "scripts/check-matsuri-external-link-maintenance.mjs"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-external-link-maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Verify external-link maintenance contract
        run: node scripts/check-matsuri-external-link-maintenance.mjs

      - name: Write verification summary
        if: always()
        run: |
          echo "## Matsuri external-link maintenance" >> "$GITHUB_STEP_SUMMARY"
          echo "- Every public Entity must retain at least one external link and exactly one primary link" >> "$GITHUB_STEP_SUMMARY"
          echo "- Every link must use a unique absolute HTTPS URL and a valid last_checked_at day" >> "$GITHUB_STEP_SUMMARY"
          echo "- Link check dates must not be future-dated or later than the containing Entity update" >> "$GITHUB_STEP_SUMMARY"
          echo "- Seven invalid in-memory fixtures must be rejected" >> "$GITHUB_STEP_SUMMARY"
