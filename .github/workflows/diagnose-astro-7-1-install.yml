name: Diagnose Astro 7.1 frozen install

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/diagnose-astro-7-1-install.yml"
      - "apps/matsuri/package.json"
      - "apps/portal/package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose-install:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.10.0

      - name: Capture frozen install result
        shell: bash
        run: |
          set +e
          pnpm install --frozen-lockfile > astro-install.log 2>&1
          status=$?
          echo "$status" > astro-install.status
          cat astro-install.log
          exit 0

      - name: Upload install diagnostic
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: astro-7-1-install-diagnostic-${{ github.sha }}
          path: |
            astro-install.log
            astro-install.status
          if-no-files-found: error
          retention-days: 7
