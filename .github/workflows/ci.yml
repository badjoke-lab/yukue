name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        run: npm install --global pnpm@11.10.0

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Chromium for browser audit
        run: pnpm exec playwright install --with-deps chromium

      - name: Verify release candidate
        shell: bash
        run: |
          set -o pipefail
          pnpm verify:release 2>&1 | tee release-verification.log

      - name: Upload failed verification log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-verification-log
          path: release-verification.log
          if-no-files-found: error
          retention-days: 7

      - name: Upload failed browser audit artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-audit-artifacts
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7
