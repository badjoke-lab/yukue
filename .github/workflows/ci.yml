name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        run: npm install --global pnpm@11.10.0

      - name: Install dependencies
        id: install
        continue-on-error: true
        shell: bash
        run: |
          pnpm install --no-frozen-lockfile > install.log 2>&1

      - name: Upload install log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: install-log
          path: install.log

      - name: Fail if dependency install failed
        if: steps.install.outcome == 'failure'
        run: exit 1

      - name: Build workspaces
        run: pnpm build
