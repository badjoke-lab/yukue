name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        run: npm install --global pnpm@11.10.0

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build observation core
        id: projection
        continue-on-error: true
        run: pnpm --filter @badjoke-lab/yukue-observation-core build > projection-build.log 2>&1

      - name: Upload projection build diagnostics
        if: steps.projection.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: projection-build-diagnostics
          path: projection-build.log

      - name: Fail on projection build error
        if: steps.projection.outcome == 'failure'
        run: |
          cat projection-build.log
          exit 1

      - name: Build workspaces
        run: pnpm build
