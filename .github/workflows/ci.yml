name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        run: npm install --global pnpm@11.10.0

      - name: Install dependencies
        shell: bash
        run: |
          set +e
          pnpm install --no-frozen-lockfile > install.log 2>&1
          status=$?
          tail -n 80 install.log
          exit $status

      - name: Build workspaces
        run: pnpm build
