name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24

      - name: Install pnpm
        run: npm install --global pnpm@11.10.0

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Chromium for browser audit
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Matsuri repository launch readiness gate
        shell: bash
        run: |
          set -o pipefail
          pnpm gate:matsuri:repository 2>&1 | tee release-verification.log

      - name: Upload verified Matsuri release candidate
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: matsuri-release-candidate-${{ github.sha }}
          path: .release-candidate/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 30

      - name: Upload failed verification log
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-verification-log
          path: release-verification.log
          if-no-files-found: error
          retention-days: 7

      - name: Upload failed browser audit artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: browser-audit-artifacts
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7
