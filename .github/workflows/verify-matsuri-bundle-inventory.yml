name: Verify Matsuri bundle inventory and repository baseline

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/verify-matsuri-bundle-inventory.yml"
      - "apps/matsuri/scripts/load-matsuri-dataset.mjs"
      - "apps/matsuri/src/data/matsuri-projection.ts"
      - "config/jinja-start-gate.json"
      - "config/matsuri-analytics-activation.json"
      - "config/matsuri-repository-baseline.json"
      - "data/public/matsuri/f1/**"
      - "data/public/matsuri/f2/**"
      - "docs/matsuri-repository-baseline.md"
      - "docs/project-status.md"
      - "scripts/check-matsuri-bundle-inventory.mjs"
      - "scripts/check-matsuri-repository-baseline.mjs"
      - "package.json"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/verify-matsuri-bundle-inventory.yml"
      - "apps/matsuri/scripts/load-matsuri-dataset.mjs"
      - "apps/matsuri/src/data/matsuri-projection.ts"
      - "config/jinja-start-gate.json"
      - "config/matsuri-analytics-activation.json"
      - "config/matsuri-repository-baseline.json"
      - "data/public/matsuri/f1/**"
      - "data/public/matsuri/f2/**"
      - "docs/matsuri-repository-baseline.md"
      - "docs/project-status.md"
      - "scripts/check-matsuri-bundle-inventory.mjs"
      - "scripts/check-matsuri-repository-baseline.mjs"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-bundle-inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.10.0

      - name: Verify bundle inventory, order, and current repository baseline
        run: pnpm check:matsuri:bundle-inventory

      - name: Write verification summary
        if: always()
        run: |
          echo "## Matsuri bundle inventory and repository baseline" >> "$GITHUB_STEP_SUMMARY"
          echo "- Canonical loader and HTML Public Projection must enumerate the same F1 batches, maintenance batches, and correction bundles" >> "$GITHUB_STEP_SUMMARY"
          echo "- additiveBundles must preserve F1-then-maintenance order and correctionBundles must preserve declared correction order" >> "$GITHUB_STEP_SUMMARY"
          echo "- Current counts and blocked Analytics/Jinja boundaries must match the machine baseline" >> "$GITHUB_STEP_SUMMARY"
          echo "- Project status must reference the machine baseline without duplicating exact current count tables" >> "$GITHUB_STEP_SUMMARY"
          echo "- Missing, extra, duplicate, nonexistent, reordered, stale, or malformed references fail the check" >> "$GITHUB_STEP_SUMMARY"